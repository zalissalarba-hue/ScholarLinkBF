<head>
    <meta charset="UTF-8">
    <title>ScholarLinkBF</title>
</head>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-success text-white text-center">
                    <h3>Connexion</h3>
                </div>

                <div class="card-body">

                    <form method="POST" action="/login">

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">
                            Se connecter
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/register">
                            Créer un compte
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>
