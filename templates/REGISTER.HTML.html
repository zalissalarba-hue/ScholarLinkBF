<head>
    <meta charset="UTF-8">
    <title>ScholarLinkBF</title>
</head>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h3>Inscription</h3>
                </div>

                <div class="card-body">

                    <form method="POST" action="/register">

                        <div class="mb-3">
                            <label class="form-label">Nom</label>
                            <input type="text"
                                   name="nom"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Prénom</label>
                            <input type="text"
                                   name="prenom"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            S'inscrire
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">
                            Déjà un compte ? Se connecter
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>
